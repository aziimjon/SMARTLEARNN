name: smartlearn
description: "SmartLearn — кроссплатформенный LMS (Flutter → Android/iOS)."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP client
  dio: ^5.4.3

  # Navigation
  go_router: ^13.2.0

  # Local storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Dependency injection
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Code generation annotations
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Images
  cached_network_image: ^3.3.1

  # Localisation / formatting
  intl: ^0.20.2

  # Functional error handling (Either<Failure, T>)
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generators
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.7.1
  riverpod_generator: ^2.4.0
  injectable_generator: ^2.4.1

flutter:
  uses-material-design: true
  generate: true
